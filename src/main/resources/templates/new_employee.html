<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container my-5">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h3>Add New Employee</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/saveEmployee}" th:object="${employee}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control" placeholder="Enter first name" required>
                        <div class="invalid-feedback" th:errors="*{firstName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" placeholder="Enter last name" required>
                        <div class="invalid-feedback" th:errors="*{lastName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" th:field="*{jobTitle}" class="form-control" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:errors="*{jobTitle}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select th:field="*{status}" class="form-select" th:errorclass="is-invalid">
                            <option value="">-- Select Status --</option>
                            <option value="Active">Active</option>
                            <option value="On-Leave">On-Leave</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{status}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email" required>
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Save Employee</button>
                        <a th:href="@{/}" class="btn btn-secondary">Back to List</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
