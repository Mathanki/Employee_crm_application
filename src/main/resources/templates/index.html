<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container my-5">
    <div class="card shadow">
        <div class="card-header bg-success-subtle text-dark d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Employee List</h2>
            <a th:href="@{/showNewEmployeeForm}" class="btn btn-success btn-sm">Add Employee</a>
        </div>
        <div class="card-body">

            <form th:action="@{/}" class="row g-3 mb-4">
                <input type="hidden" name="sortField" th:value="${sortField}"/>
                <input type="hidden" name="sortDir" th:value="${sortDir}"/>
                <div class="col-auto">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search employees..." required />
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a th:href="@{/}" class="btn btn-secondary">Clear</a>
                </div>
            </form>

            <table class="table table-hover table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>
                        <a class="text-white text-decoration-none" th:href="@{'/?pageNum=' + ${currentPage} + '&sortField=firstName&sortDir=' + ${reverseSortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}">
                            First Name [[${sortField == 'firstName' ? (sortDir == 'asc' ? '↑' : '↓') : ''}]]
                        </a>
                    </th>
                    <th>
                        <a class="text-white text-decoration-none" th:href="@{'/?pageNum=' + ${currentPage} + '&sortField=lastName&sortDir=' + ${reverseSortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}">
                            Last Name [[${sortField == 'lastName' ? (sortDir == 'asc' ? '↑' : '↓') : ''}]]
                        </a>
                    </th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="employee : ${listEmployees}">
                    <td th:text="${employee.firstName}"></td>
                    <td th:text="${employee.lastName}"></td>
                    <td th:text="${employee.email}"></td>
                    <td>
                        <a th:href="@{/showFormForUpdate/{id}(id=${employee.id})}" class="btn btn-info btn-sm text-white">Update</a>
                        <a th:href="@{/deleteEmployee/{id}(id=${employee.id})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this employee?')">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${totalPages > 1}" aria-label="Page navigation">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{'/?pageNum=1&sortField=' + ${sortField} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}">First</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                        <a class="page-link" th:href="@{'/?pageNum=' + ${i} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}">[[${i}]]</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{'/?pageNum=' + ${totalPages} + '&sortField=' + ${sortField} + '&sortDir=' + ${sortDir} + ${keyword != null ? '&keyword=' + keyword : ''}}">Last</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>
</body>
</html>
